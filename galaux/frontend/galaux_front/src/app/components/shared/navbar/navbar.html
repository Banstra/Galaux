<header class="navbar">
  <div class="navbar-main">
    <div class="navbar-start">
      <img src="assets/images/logo.png" width="90" alt="logo" routerLink="/landing" class="logo-img">
    </div>

    <nav class="navbar-center">
      <a routerLink="/landing" routerLinkActive="active" class="nav-item">
        <i class="pi pi-home"></i>
        <span>Главная</span>
      </a>
      <a routerLink="/rules" routerLinkActive="active" class="nav-item">
        <i class="pi pi-book"></i>
        <span>Правила</span>
      </a>
      <a routerLink="/help" routerLinkActive="active" class="nav-item">
        <i class="pi pi-comment"></i>
        <span>Помощь</span>
      </a>
      <a routerLink="/launcher" routerLinkActive="active" class="nav-item">
        <i class="pi pi-download"></i>
        <span>Лаунчер</span>
      </a>
    </nav>

    <div class="navbar-end">
      @if (auth.isAuth()) {
        @if (onProfile) {
          <button type="button" class="profile-btn" (click)="logout()">Выйти</button>
        } @else {
          <a routerLink="/profile" class="profile-btn">Профиль</a>
        }
      } @else {
        <a routerLink="/auth" class="profile-btn">Войти</a>
      }
    </div>
  </div>

  @if (auth.isAuth()) {
    <div class="sos-bar">
      <button type="button" class="sos-btn" aria-label="Вызов помощи SOS">SOS</button>
    </div>
  }
</header>
