<div class="options-page">
  <!-- Child header -->
  <div class="child-header">
    <button type="button" class="back-btn" aria-label="Назад">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="child-name">Имя ребенка</span>
    </button>
    <div class="status-badge">
      <span class="status-dot online"></span>
      <span class="status-text">Онлайн&nbsp;&nbsp;1 час</span>
    </div>
  </div>

  <!-- Stats grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-label">Время за сегодня</span>
      <span class="stat-value">3 Часа</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Друзей</span>
      <span class="stat-value">5</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Серверов посещено</span>
      <span class="stat-value">3</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Уведомлений</span>
      <span class="stat-value">10</span>
    </div>
  </div>

  <!-- Timeline -->
  <section class="section">
    <h2 class="section-title">Хронология</h2>
    <div class="timeline">
      <div class="timeline-item">
        <div class="tl-bullet blue"></div>
        <span class="tl-text bold blue-text">Начало</span>
      </div>
      <div class="timeline-item">
        <div class="tl-bullet blue"></div>
        <span class="tl-text blue-text">Вход на Test.server в 10:10</span>
      </div>
      <div class="timeline-item">
        <div class="tl-bullet orange"></div>
        <span class="tl-text orange-text">Бан с Test.server в 10:20</span>
      </div>
      <div class="timeline-item">
        <div class="tl-bullet blue"></div>
        <span class="tl-text blue-text">Вход на Test.server в 10:10</span>
      </div>
      <div class="timeline-item">
        <div class="tl-bullet red"></div>
        <span class="tl-text red-text bold">Нажата кнопка SOS в 10:20</span>
      </div>
      <div class="timeline-item">
        <div class="tl-bullet blue"></div>
        <span class="tl-text blue-text">Вход на Test.server в 10:10</span>
      </div>
      <div class="timeline-item">
        <div class="tl-bullet orange"></div>
        <span class="tl-text orange-text">Бан с Test.server в 10:20</span>
      </div>
      <div class="timeline-item last">
        <div class="tl-bullet blue"></div>
        <span class="tl-text bold blue-text">Конец</span>
      </div>
    </div>
  </section>

  <!-- Quick actions -->
  <section class="section">
    <h2 class="section-title">Быстрые действия</h2>
    <div class="quick-actions">
      <button type="button" class="qa-btn blue-btn">Ограничить время</button>
      <button type="button" class="qa-btn red-btn">Заблокировать</button>
      <button type="button" class="qa-btn orange-btn">Экспорт чатов</button>
    </div>
  </section>

  <!-- Settings -->
  <section class="section">
    <h2 class="section-title">Настройки</h2>
    <div class="settings-checkboxes">
      <label class="setting-item">
        <input type="checkbox" />
        <span>test</span>
      </label>
      <label class="setting-item">
        <input type="checkbox" />
        <span>test</span>
      </label>

        <span>test</span>

      </label>

        <span>test</span>
      </label>
    </div>
  </section>
