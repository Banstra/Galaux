  <section class="hero">

      <p class="slogan">Играй безопасно и общайся с теми, кто тебя понимает</p>

  <!-- Блок "Найти сервера" -->
  <section class="servers-section">
    <h2>Найти сервера</h2>
    <p>Найди подходящий для себя мир!</p>

    <div class="show-more" *ngIf="visibleCount < servers.length">
      <button pButton label="Показать еще" class="p-button-outlined" (click)="showMore()"></button>
    </div>
  </section>

  <!-- Блок безопасности -->
  <section class="safety">
    <h2>Безопасность</h2>
    <div class="safety-sections">
      <div *ngFor="let section of safetySections" class="safety-section">
        <!-- Вариант: карточки слева, картинка справа -->
        <div *ngIf="section.layout === 'cards-left'" class="safety-row cards-left">
          <div class="safety-cards">
            <div *ngFor="let card of section.cards" class="safety-card">
              <h3>{{ card.title }}</h3>
              <p>{{ card.description }}</p>
              <span class="card-extra">{{ card.extra }}</span>
            </div>
          </div>
          <div class="safety-image">
            <img [src]="section.imageUrl" alt="Безопасность" />
          </div>
        </div>

        <!-- Вариант: картинка слева, карточки справа -->
        <div *ngIf="section.layout === 'image-left'" class="safety-row image-left">
          <div class="safety-image">
            <img [src]="section.imageUrl" alt="Безопасность" />
          </div>
          <div class="safety-cards">
            <div *ngFor="let card of section.cards" class="safety-card">
              <h3>{{ card.title }}</h3>
              <p>{{ card.description }}</p>
              <span class="card-extra">{{ card.extra }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
